<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Prohibition: no through traffic -->
  <circle cx="50" cy="50" r="44" fill="white" stroke="#E30000" stroke-width="8"/>
  <!-- Car silhouette -->
  <rect x="30" y="40" width="40" height="16" rx="4" fill="#1a1a1a"/>
  <rect x="36" y="32" width="28" height="12" rx="3" fill="#1a1a1a"/>
  <circle cx="38" cy="58" r="4" fill="#1a1a1a"/>
  <circle cx="62" cy="58" r="4" fill="#1a1a1a"/>
  <!-- Red diagonal -->
  <line x1="19" y1="19" x2="81" y2="81" stroke="#E30000" stroke-width="6" stroke-linecap="round"/>
</svg>
