<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Railway crossing with barriers -->
  <polygon points="50,8 95,88 5,88" fill="#FFDD00" stroke="#E30000" stroke-width="4"/>
  <!-- Train symbol -->
  <rect x="35" y="38" width="30" height="28" rx="4" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <rect x="38" y="42" width="10" height="8" rx="1" fill="#1a1a1a"/>
  <rect x="52" y="42" width="10" height="8" rx="1" fill="#1a1a1a"/>
  <circle cx="40" cy="68" r="4" fill="#1a1a1a"/>
  <circle cx="60" cy="68" r="4" fill="#1a1a1a"/>
  <!-- Barrier lines -->
  <line x1="22" y1="55" x2="35" y2="55" stroke="#E30000" stroke-width="3"/>
  <line x1="65" y1="55" x2="78" y2="55" stroke="#E30000" stroke-width="3"/>
</svg>
