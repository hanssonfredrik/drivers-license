<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Warning: railway crossing without barriers -->
  <polygon points="50,8 95,88 5,88" fill="#FFDD00" stroke="#E30000" stroke-width="4"/>
  <!-- Rail cross (X) -->
  <line x1="35" y1="35" x2="65" y2="70" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <line x1="65" y1="35" x2="35" y2="70" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <!-- Rail ties -->
  <line x1="42" y1="42" x2="58" y2="42" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="38" y1="53" x2="62" y2="53" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="42" y1="63" x2="58" y2="63" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
</svg>
