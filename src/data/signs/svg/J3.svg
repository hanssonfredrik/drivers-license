<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Bicycle crossing (cykelöverfart) - blue square with bicycle symbol -->
  <rect x="6" y="6" width="88" height="88" rx="8" fill="#0055AA"/>
  <polygon points="50,15 85,85 15,85" fill="white"/>
  <!-- Bicycle on crossing -->
  <circle cx="40" cy="62" r="8" fill="none" stroke="#0055AA" stroke-width="2.5"/>
  <circle cx="60" cy="62" r="8" fill="none" stroke="#0055AA" stroke-width="2.5"/>
  <line x1="40" y1="62" x2="50" y2="44" stroke="#0055AA" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="44" x2="60" y2="62" stroke="#0055AA" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="62" x2="55" y2="62" stroke="#0055AA" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="44" x2="57" y2="42" stroke="#0055AA" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Stripes -->
  <rect x="28" y="72" width="44" height="3" fill="#0055AA"/>
  <rect x="32" y="78" width="36" height="3" fill="#0055AA"/>
</svg>
