<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Walking pace area (gångfartsområde) -->
  <rect x="6" y="6" width="88" height="88" rx="8" fill="#0055AA"/>
  <!-- Walking person -->
  <circle cx="35" cy="28" r="5" fill="white"/>
  <line x1="35" y1="33" x2="35" y2="52" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="35" y1="52" x2="28" y2="68" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="35" y1="52" x2="42" y2="68" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="35" y1="40" x2="25" y2="48" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- House -->
  <polygon points="60,30 75,42 45,42" fill="white"/>
  <rect x="48" y="42" width="24" height="20" fill="white"/>
  <rect x="55" y="48" width="10" height="14" fill="#0055AA"/>
  <!-- Car -->
  <rect x="50" y="70" width="22" height="8" rx="2" fill="white"/>
  <rect x="54" y="65" width="14" height="7" rx="2" fill="white"/>
</svg>
