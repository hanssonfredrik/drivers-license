<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Mandatory bicycle lane: blue circle with white bicycle -->
  <circle cx="50" cy="50" r="44" fill="#0055AA"/>
  <!-- Simplified bicycle icon -->
  <circle cx="36" cy="58" r="10" fill="none" stroke="white" stroke-width="3"/>
  <circle cx="64" cy="58" r="10" fill="none" stroke="white" stroke-width="3"/>
  <!-- Frame -->
  <line x1="36" y1="58" x2="50" y2="38" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="38" x2="64" y2="58" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="36" y1="58" x2="54" y2="58" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Handlebar -->
  <line x1="50" y1="38" x2="58" y2="36" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Seat -->
  <line x1="44" y1="44" x2="50" y2="44" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
