<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Pedestrian crossing (övergångsställe) - blue square with white triangle and person -->
  <rect x="6" y="6" width="88" height="88" rx="8" fill="#0055AA"/>
  <polygon points="50,15 85,85 15,85" fill="white"/>
  <!-- Walking person on stripes -->
  <circle cx="48" cy="32" r="4" fill="#0055AA"/>
  <line x1="48" y1="36" x2="48" y2="52" stroke="#0055AA" stroke-width="3" stroke-linecap="round"/>
  <line x1="48" y1="52" x2="42" y2="66" stroke="#0055AA" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="48" y1="52" x2="54" y2="66" stroke="#0055AA" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="48" y1="42" x2="40" y2="48" stroke="#0055AA" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Zebra stripes -->
  <rect x="28" y="70" width="44" height="3" fill="#0055AA"/>
  <rect x="32" y="76" width="36" height="3" fill="#0055AA"/>
</svg>
