<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- End of priority road: yellow diamond with diagonal lines -->
  <rect x="15" y="15" width="70" height="70" rx="4" fill="#FFDD00" stroke="white" stroke-width="6" transform="rotate(45 50 50)"/>
  <!-- Diagonal strike lines -->
  <line x1="25" y1="75" x2="75" y2="25" stroke="#333" stroke-width="4"/>
  <line x1="30" y1="75" x2="75" y2="30" stroke="#333" stroke-width="4"/>
  <line x1="25" y1="70" x2="70" y2="25" stroke="#333" stroke-width="4"/>
</svg>
